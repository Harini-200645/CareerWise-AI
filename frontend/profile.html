<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - CareerWise AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.profile-container{
    width:450px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.profile-header{
    text-align:center;
    margin-bottom:25px;
}

.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#4f46e5;
    color:white;
    font-size:32px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    margin-bottom:15px;
}

.profile-header h2{
    color:#333;
    margin-bottom:10px;
}

#currentName{
    color:#4f46e5;
    font-size:20px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#444;
}

.form-group input,
.form-group select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;
}

.save-btn{
    width:100%;
    padding:12px;
    border:none;
    background:#4f46e5;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

.save-btn:hover{
    background:#4338ca;
}

.back-btn{
    background:#4f46e5;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:20px;
}

.back-btn:hover{
    background:#4338ca;
}
</style>
</head>

<body>

<div class="profile-container">

    <div class="profile-header">
        <div class="avatar" id="avatar">CW</div>

        <h2>My Profile</h2>

        <h3 id="currentName">User Name</h3>
    </div>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter Name" required>
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter Email" required>
    </div>

    <div class="form-group">
        <label>Career Interest</label>
        <select id="career">
            <option>Java Full Stack Developer</option>
            <option>Data Scientist</option>
            <option>AI Engineer</option>
            <option>Cloud Engineer</option>
            <option>Cyber Security</option>
        </select>
    </div>

    <button class="save-btn" onclick="saveProfile()">
        Save Profile
    </button>

    <br><br>

    <button class="back-btn" onclick="window.location.href='index.html'">
        ← Go Back
    </button>

</div>

<script>
window.onload = function () {
    const userId = localStorage.getItem("userId");

    if (!userId) {
        alert("Please login first");
        window.location.href = "login.html";
        return;
    }

    fetch("http://localhost:8080/users/" + userId)
        .then(response => {
            if (!response.ok) {
                throw new Error("Unable to load profile");
            }
            return response.json();
        })
        .then(user => {
            document.getElementById("name").value = user.name || "";
            document.getElementById("email").value = user.email || "";

            document.getElementById("currentName").innerText =
                user.name || "User Name";

            if (user.name) {
                document.getElementById("avatar").innerText =
                    user.name.substring(0, 2).toUpperCase();
            }
        })
        .catch(error => {
            console.error(error);
            alert("Unable to load profile");
        });
};

function saveProfile() {
    const userId = localStorage.getItem("userId");
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();

    if (name === "") {
        alert("Please enter your name");
        return;
    }

    fetch("http://localhost:8082/users/update/" + userId, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            email: email
        })
    })
    .then(response => {
        if (!response.ok) {
            throw new Error("Profile update failed");
        }
        return response.json();
    })
    .then(updatedUser => {
        localStorage.setItem("userName", updatedUser.name);
        localStorage.setItem("userEmail", updatedUser.email);

        document.getElementById("currentName").innerText = updatedUser.name;
        document.getElementById("avatar").innerText =
            updatedUser.name.substring(0, 2).toUpperCase();

        alert("Profile updated successfully!");
    })
    .catch(error => {
        console.error(error);
        alert("Profile update failed");
    });
}
</script>

</body>
</html>
