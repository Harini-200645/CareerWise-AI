<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CareerWise - Career Roadmap</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
    color:#1e293b;
}

/* Header */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 40px;
    background:#2563eb;
    color:white;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.logo{
    font-size:26px;
    font-weight:700;
}

header button{
    padding:12px 22px;
    border:none;
    border-radius:8px;
    background:white;
    color:#2563eb;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

header button:hover{
    background:#dbeafe;
}

/* Hero */

.hero{
    text-align:center;
    padding:50px 20px;
    background:linear-gradient(135deg,#2563eb,#4f46e5);
    color:white;
}

.hero h1{
    font-size:40px;
    margin-bottom:10px;
}

.hero p{
    font-size:18px;
}

/* AI Box */

.ai-box{
    width:90%;
    max-width:900px;
    margin:30px auto;
    background:linear-gradient(135deg,#2563eb,#1e40af);
    color:white;
    padding:25px;
    text-align:center;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,.1);
}

/* Search */

#roadmapSearch{
    width:80%;
    max-width:500px;
    display:block;
    margin:30px auto;
    padding:12px 20px;
    border:2px solid #2563eb;
    border-radius:30px;
    font-size:16px;
    outline:none;
}

/* Timeline */

#roadmapContainer,
#allRoadmapContainer{
    width:90%;
    max-width:1100px;
    margin:40px auto;
}

.step{
    background:white;
    margin:20px auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.step h2{
    color:#2563eb;
    margin-bottom:12px;
}

.step p{
    color:#555;
    line-height:1.8;
}

.result{
    background:#dcfce7;
    border-left:6px solid #16a34a;
}

.result h2{
    color:#15803d;
}

/* Career Title */

.career-title{
    margin-top:50px;
    margin-bottom:20px;
    text-align:center;
}

.career-title h2{
    color:#2563eb;
    font-size:30px;
}

.recommended{
    background:#ecfdf5;
    border-left:6px solid #16a34a;
    padding:15px;
    border-radius:12px;
}

.recommended h2{
    color:#16a34a;
}

/* Footer */

footer{
    margin-top:50px;
    background:#1e293b;
    color:white;
    text-align:center;
    padding:20px;
}

/* Responsive */

@media(max-width:768px){

header{
    flex-direction:column;
    gap:15px;
}

.hero h1{
    font-size:30px;
}

#roadmapSearch{
    width:95%;
}

.ai-box{
    width:95%;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
 CareerWise 
</div>

<button onclick="location.href='dashboard.html'">
<i class="fas fa-arrow-left"></i>
Dashboard
</button>

</header>

<section class="hero">

<h1 id="careerTitle">
Career Roadmap
</h1>

<p>
Follow this learning roadmap to become industry ready.
</p>

</section>

<!-- AI Recommendation -->

<div id="aiRoadmapContainer"></div>

<!-- Recommended Career Roadmap -->

<div id="roadmapContainer"></div>

<hr style="margin:40px 0;">

<!-- Search -->

<input
type="text"
id="roadmapSearch"
placeholder="🔍 Search Career Roadmap..."
>

<!-- All Career Roadmaps -->

<div id="allRoadmapContainer"></div>

<footer>

© 2026 CareerWise AI

</footer>

<script src="roadmap.js"></script>

</body>

</html>
