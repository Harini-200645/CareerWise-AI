<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - CareerWise </title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#f4f7fc;
        padding:30px;
    }

    .admin-container{
        max-width:1000px;
        margin:auto;
        background:white;
        padding:30px;
        border-radius:15px;
        box-shadow:0 5px 20px rgba(0,0,0,0.1);
    }

    h2{
        color:#4f46e5;
        margin-bottom:20px;
        text-align:center;
    }

    .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
    }

    button{
        background:#4f46e5;
        color:white;
        border:none;
        padding:10px 16px;
        border-radius:8px;
        cursor:pointer;
        font-size:15px;
    }

    button:hover{
        background:#4338ca;
    }

    table{
        width:100%;
        border-collapse:collapse;
        margin-top:20px;
    }

    th, td{
        padding:12px;
        border:1px solid #ddd;
        text-align:left;
    }

    th{
        background:#4f46e5;
        color:white;
    }

    .message{
        text-align:center;
        margin-top:15px;
        font-weight:bold;
    }
    .header-buttons{
    display:flex;
    gap:10px;
}
</style>
</head>

<body>
    <div class="header">
    <div>
        <h2>CareerWise — Admin Dashboard</h2>
        <p id="adminName"></p>
    </div>

    <div class="header-buttons">
       <button onclick="window.location.href='admin-register.html'">Back</button>
        <button onclick="logout()">Logout</button>
        <button onclick="window.location.href='admin-enrollments.html'">
    Enrollment Management
</button>
    </div>

<div class="admin-container">

    <div class="top-bar">
        <h2>All Registered Users</h2>

        <button onclick="loadUsers()">Load Users</button>
    </div>

    <p id="message" class="message"></p>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Career Interest</th>
                <th>Role</th>
            </tr>
        </thead>

        <tbody id="userTableBody">
        </tbody>
    </table>

</div>

<script>
function loadUsers() {

    const messageBox = document.getElementById("message");
    const tableBody = document.getElementById("userTableBody");

    messageBox.innerText = "Loading users...";
    messageBox.style.color = "#4f46e5";

    fetch("http://localhost:8082/users/admin/all-users")
        .then(response => {
            if (!response.ok) {
                throw new Error("Unable to load users");
            }

            return response.json();
        })
        .then(users => {

            tableBody.innerHTML = "";

            if (users.length === 0) {
                messageBox.style.color = "red";
                messageBox.innerText = "No users found.";
                return;
            }

            users.forEach(user => {

                const row = `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name || ""}</td>
                        <td>${user.email || ""}</td>
                        <td>${user.careerInterest || ""}</td>
                        <td>${user.role || ""}</td>
                    </tr>
                `;

                tableBody.innerHTML += row;
            });

            messageBox.style.color = "green";
            messageBox.innerText = users.length + " users loaded successfully.";
        })
        .catch(error => {
            console.error(error);

            messageBox.style.color = "red";
            messageBox.innerText = error.message;
        });
}
function goBack() {
    window.history.back();
}

function logout() {
    localStorage.removeItem("userId");
    localStorage.removeItem("userName");
    localStorage.removeItem("userEmail");
    localStorage.removeItem("userRole");

    window.location.href = "admin-login.html";
}

</script>

</body>
</html>
